name: GitHub Metrics
on:
  # Actualiza las estadísticas cada 24 horas
  schedule: [{cron: "0 0 * * *"}]
  # Permite correr el workflow manualmente desde la pestaña "Actions"
  workflow_dispatch:
  # Ejecuta el action cuando haces un cambio en tu README
  push: {branches: ["main", "master"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          # Usa el token automático de GitHub
          token: ${{ secrets.GITHUB_TOKEN }}
          
          # Tu usuario de GitHub
          user: KaarLarax 
          committer_branch: main
          
          base: ""
          
          # ACTIVA solo la gráfica de lenguajes
          plugin_languages: yes
          plugin_languages_details: percentage # Muestra el porcentaje de cada uno
          
          config_timezone: America/Mexico_City
